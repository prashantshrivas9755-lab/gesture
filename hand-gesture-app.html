<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRON HAND</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#000;font-family:'Orbitron',monospace;overflow:hidden;height:100vh}
  #videoElement{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;transform:scaleX(-1);opacity:0}
  #bgCanvas{position:fixed;inset:0;width:100%;height:100%}
  #drawCanvas{position:fixed;inset:0;width:100%;height:100%;transform:scaleX(-1)}
  #fxCanvas{position:fixed;inset:0;width:100%;height:100%;transform:scaleX(-1);pointer-events:none}
  .hud-top{position:fixed;top:0;left:0;right:0;padding:10px 16px;display:flex;justify-content:space-between;z-index:100;pointer-events:none}
  .hud-title{font-size:0.7rem;letter-spacing:0.3em;color:#ff6600;text-shadow:0 0 10px #ff6600}
  .hud-status{font-size:0.6rem;letter-spacing:0.2em;color:#ffaa00}
  .hud-bottom{position:fixed;bottom:0;left:0;right:0;padding:10px 16px;display:flex;justify-content:space-between;align-items:flex-end;z-index:100;pointer-events:none}
  #gestureBox{font-size:1rem;font-weight:900;color:#ff6600;text-shadow:0 0 15px #ff6600}
  #modeBox{font-size:0.6rem;letter-spacing:0.15em;padding:4px 10px;border:1px solid #ff6600;border-radius:2px;color:#ff6600;text-shadow:0 0 8px #ff6600}
  .hud-corner{position:fixed;width:30px;height:30px;pointer-events:none;z-index:100}
  .tl{top:28px;left:8px;border-top:2px solid #ff6600;border-left:2px solid #ff6600}
  .tr{top:28px;right:8px;border-top:2px solid #ff6600;border-right:2px solid #ff6600}
  .bl{bottom:28px;left:8px;border-bottom:2px solid #ff6600;border-left:2px solid #ff6600}
  .br{bottom:28px;right:8px;border-bottom:2px solid #ff6600;border-right:2px solid #ff6600}
  #startBtn{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Orbitron',monospace;font-size:1rem;font-weight:700;color:#000;background:linear-gradient(135deg,#ff6600,#ffaa00);border:none;padding:16px 36px;border-radius:2px;cursor:pointer;letter-spacing:0.15em;box-shadow:0 0 40px #ff6600;z-index:200}
  #guide{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:rgba(255,102,0,0.5);font-size:0.65rem;letter-spacing:0.15em;pointer-events:none;z-index:100;line-height:2.2}
  .scan-line{position:fixed;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,102,0,0.4),transparent);animation:scan 4s linear infinite;pointer-events:none;z-index:50}
  @keyframes scan{0%{top:-2px}100%{top:100%}}
  #clearBtn{position:fixed;top:10px;right:16px;font-family:'Orbitron',monospace;font-size:0.55rem;color:#ff4444;border:1px solid #ff4444;background:transparent;padding:4px 10px;border-radius:2px;cursor:pointer;letter-spacing:0.1em;z-index:200}
</style>
</head>
<body>
<video id="videoElement" playsinline></video>
<canvas id="bgCanvas"></canvas>
<canvas id="drawCanvas"></canvas>
<canvas id="fxCanvas"></canvas>

<div class="hud-top">
  <div class="hud-title">⬡ IRON HAND</div>
  <div class="hud-status" id="statusText">OFFLINE</div>
</div>
<div class="hud-bottom">
  <div id="gestureBox">– – –</div>
  <div id="modeBox">STANDBY</div>
</div>
<div class="hud-corner tl"></div>
<div class="hud-corner tr"></div>
<div class="hud-corner bl"></div>
<div class="hud-corner br"></div>
<div class="scan-line"></div>
<button id="clearBtn" onclick="clearAll()">✕ CLEAR</button>

<div id="guide">
  ☝ SIRF INDEX FINGER = DRAW<br>
  ✊ FIST = GRAB & MOVE<br>
  🖐 OPEN HAND = RELEASE<br>
  👍 THUMBS UP = BLAST!
</div>

<button id="startBtn" onclick="startCamera()">⬡ ACTIVATE</button>

<script>
const bgC = document.getElementById('bgCanvas');
const bgCtx = bgC.getContext('2d');
const drawC = document.getElementById('drawCanvas');
const drawCtx = drawC.getContext('2d');
const fxC = document.getElementById('fxCanvas');
const fxCtx = fxC.getContext('2d');

let W = window.innerWidth, H = window.innerHeight;
function resize() {
  W = window.innerWidth; H = window.innerHeight;
  [bgC, drawC, fxC].forEach(c => { c.width = W; c.height = H; });
  renderDrawings();
}
window.addEventListener('resize', resize);
resize();

// ── STATE ──
let lm = null;
let strokes = [];         // [{points:[{x,y}], color, width}]
let currentStroke = null; // stroke being drawn now
let grabbedIdx = -1;      // index of grabbed stroke
let grabOffX = 0, grabOffY = 0; // offset from palm to stroke center
let prevPalmX = 0, prevPalmY = 0;
let particles = [];
let arcPulse = 0;
let scanAngle = 0;
let lastGesture = '';

function clearAll() { strokes = []; currentStroke = null; grabbedIdx = -1; renderDrawings(); }

// ── GESTURE HELPERS ──
function fingersUp(l) {
  return [
    l[4].x < l[3].x,
    l[8].y < l[6].y,
    l[12].y < l[10].y,
    l[16].y < l[14].y,
    l[20].y < l[18].y
  ];
}

// DRAW: ONLY index up, ALL others down
function isDrawMode(f) {
  return !f[0] && f[1] && !f[2] && !f[3] && !f[4];
}

// GRAB: FIST (all fingers down)
function isGrabMode(f) {
  return !f[1] && !f[2] && !f[3] && !f[4];
}

// OPEN: all 5 up
function isOpenHand(f) {
  return f[0] && f[1] && f[2] && f[3] && f[4];
}

// BLAST: thumb only
function isBlast(f) {
  return f[0] && !f[1] && !f[2] && !f[3] && !f[4];
}

function getGestureName(f) {
  if (isDrawMode(f)) return 'DRAW ☝';
  if (isBlast(f)) return 'BLAST 👍';
  if (isOpenHand(f)) return 'OPEN 🖐';
  if (isGrabMode(f)) return 'GRAB ✊';
  const n = f.filter(Boolean).length;
  return n + ' FINGERS';
}

// ── STROKE CENTER ──
function strokeCenter(stroke) {
  let sx = 0, sy = 0;
  stroke.points.forEach(p => { sx += p.x; sy += p.y; });
  return { x: sx / stroke.points.length, y: sy / stroke.points.length };
}

// ── PARTICLES ──
function spawnBlast(x, y) {
  for (let r = 0; r < 3; r++) {
    particles.push({ type: 'ring', x, y, radius: 5, life: 1, decay: 0.02 + r * 0.007, color: `hsl(${20 + r * 15},100%,${65 - r * 10}%)` });
  }
  for (let i = 0; i < 80; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = 5 + Math.random() * 12;
    particles.push({ type: 'spark', x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, life: 1, decay: 0.016 + Math.random() * 0.014, size: 2 + Math.random() * 4, color: `hsl(${10 + Math.random() * 40},100%,70%)`, tail: [] });
  }
  particles.push({ type: 'flash', x, y, life: 1, decay: 0.07, size: 90 });
  document.body.style.filter = 'brightness(2.5)';
  setTimeout(() => document.body.style.filter = '', 120);
}

// ── DRAW STROKES ──
function renderDrawings() {
  drawCtx.clearRect(0, 0, W, H);
  strokes.forEach((stroke, si) => {
    if (stroke.points.length < 2) return;
    drawCtx.beginPath();
    drawCtx.moveTo(stroke.points[0].x, stroke.points[0].y);
    stroke.points.forEach(pt => drawCtx.lineTo(pt.x, pt.y));
    const isGrabbed = si === grabbedIdx;
    drawCtx.strokeStyle = isGrabbed ? '#ffff00' : stroke.color;
    drawCtx.lineWidth = stroke.width;
    drawCtx.lineCap = 'round';
    drawCtx.lineJoin = 'round';
    drawCtx.shadowColor = isGrabbed ? '#ffff00' : stroke.color;
    drawCtx.shadowBlur = isGrabbed ? 25 : 12;
    drawCtx.stroke();
    drawCtx.shadowBlur = 0;
  });
  // Live stroke
  if (currentStroke && currentStroke.points.length > 1) {
    drawCtx.beginPath();
    drawCtx.moveTo(currentStroke.points[0].x, currentStroke.points[0].y);
    currentStroke.points.forEach(pt => drawCtx.lineTo(pt.x, pt.y));
    drawCtx.strokeStyle = '#00ffff';
    drawCtx.lineWidth = 3;
    drawCtx.lineCap = 'round';
    drawCtx.shadowColor = '#00ffff';
    drawCtx.shadowBlur = 18;
    drawCtx.stroke();
    drawCtx.shadowBlur = 0;
  }
}

// ── MAIN LOOP ──
function loop() {
  arcPulse += 0.07;
  scanAngle += 0.025;

  // BG
  bgCtx.clearRect(0, 0, W, H);

  // FX
  fxCtx.clearRect(0, 0, W, H);

  if (lm) {
    const palmX = (1 - lm[9].x) * W;
    const palmY = lm[9].y * H;

    // Arc reactor on palm
    const arcR = 16 + Math.sin(arcPulse) * 3;
    const ag = fxCtx.createRadialGradient(palmX, palmY, 0, palmX, palmY, arcR * 4);
    ag.addColorStop(0, 'rgba(255,180,50,0.8)');
    ag.addColorStop(0.4, 'rgba(255,90,0,0.4)');
    ag.addColorStop(1, 'transparent');
    fxCtx.beginPath();
    fxCtx.arc(palmX, palmY, arcR * 4, 0, Math.PI * 2);
    fxCtx.fillStyle = ag;
    fxCtx.fill();

    // Hexagon
    fxCtx.save();
    fxCtx.translate(palmX, palmY);
    fxCtx.rotate(arcPulse * 0.4);
    fxCtx.beginPath();
    for (let i = 0; i < 6; i++) {
      const a = i * Math.PI / 3;
      i === 0 ? fxCtx.moveTo(Math.cos(a) * arcR, Math.sin(a) * arcR) : fxCtx.lineTo(Math.cos(a) * arcR, Math.sin(a) * arcR);
    }
    fxCtx.closePath();
    fxCtx.strokeStyle = `rgba(255,${140 + Math.floor(Math.sin(arcPulse) * 50)},0,0.9)`;
    fxCtx.lineWidth = 2;
    fxCtx.shadowColor = '#ff6600';
    fxCtx.shadowBlur = 12;
    fxCtx.stroke();
    fxCtx.restore();

    // Skeleton
    const conn = [[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[9,10],[10,11],[11,12],[13,14],[14,15],[15,16],[17,18],[18,19],[19,20],[0,17],[5,9],[9,13],[13,17]];
    conn.forEach(([a, b]) => {
      fxCtx.beginPath();
      fxCtx.moveTo((1-lm[a].x)*W, lm[a].y*H);
      fxCtx.lineTo((1-lm[b].x)*W, lm[b].y*H);
      fxCtx.strokeStyle = 'rgba(255,102,0,0.55)';
      fxCtx.lineWidth = 1.5;
      fxCtx.shadowColor = '#ff6600';
      fxCtx.shadowBlur = 6;
      fxCtx.stroke();
    });
    lm.forEach((p, i) => {
      const isTip = [4,8,12,16,20].includes(i);
      fxCtx.beginPath();
      fxCtx.arc((1-p.x)*W, p.y*H, isTip?5:2.5, 0, Math.PI*2);
      fxCtx.fillStyle = isTip ? '#ffaa00' : '#ff6600';
      fxCtx.shadowColor = '#ff6600';
      fxCtx.shadowBlur = isTip ? 14 : 5;
      fxCtx.fill();
    });
    fxCtx.shadowBlur = 0;

    // Draw mode crosshair on index tip
    const f = fingersUp(lm);
    if (isDrawMode(f)) {
      const tx = (1-lm[8].x)*W, ty = lm[8].y*H;
      fxCtx.save();
      fxCtx.translate(tx, ty);
      fxCtx.rotate(scanAngle);
      for (let r = 0; r < 2; r++) {
        fxCtx.beginPath();
        fxCtx.arc(0, 0, 14+r*8, 0, Math.PI*1.6);
        fxCtx.strokeStyle = `rgba(0,255,255,${0.9-r*0.3})`;
        fxCtx.lineWidth = 1.5;
        fxCtx.shadowColor = '#00ffff';
        fxCtx.shadowBlur = 8;
        fxCtx.stroke();
      }
      [[-16,0],[16,0],[0,-16],[0,16]].forEach(([dx,dy]) => {
        fxCtx.beginPath();
        fxCtx.moveTo(dx>0?dx-7:dx<0?dx+7:0, dy>0?dy-7:dy<0?dy+7:0);
        fxCtx.lineTo(dx,dy);
        fxCtx.strokeStyle='rgba(0,255,255,1)';
        fxCtx.lineWidth=1.5;
        fxCtx.stroke();
      });
      fxCtx.restore();
    }
  }

  // Particles
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    p.life -= p.decay;
    if (p.type === 'ring') {
      p.radius += 5;
      fxCtx.beginPath();
      fxCtx.arc(p.x, p.y, p.radius, 0, Math.PI*2);
      fxCtx.strokeStyle = p.color + Math.floor(p.life*180).toString(16).padStart(2,'0');
      fxCtx.lineWidth = 2+p.life*5;
      fxCtx.shadowColor = p.color;
      fxCtx.shadowBlur = 20;
      fxCtx.stroke();
      fxCtx.shadowBlur = 0;
    } else if (p.type === 'spark') {
      if (p.tail.length > 8) p.tail.shift();
      p.tail.push({x:p.x,y:p.y});
      p.x += p.vx; p.y += p.vy;
      p.vx *= 0.93; p.vy *= 0.93; p.vy += 0.28;
      if (p.tail.length > 1) {
        fxCtx.beginPath();
        fxCtx.moveTo(p.tail[0].x, p.tail[0].y);
        p.tail.forEach(pt => fxCtx.lineTo(pt.x, pt.y));
        fxCtx.strokeStyle = p.color;
        fxCtx.lineWidth = p.size * p.life;
        fxCtx.shadowColor = p.color;
        fxCtx.shadowBlur = 8;
        fxCtx.globalAlpha = p.life;
        fxCtx.stroke();
        fxCtx.globalAlpha = 1;
        fxCtx.shadowBlur = 0;
      }
    } else if (p.type === 'flash') {
      const fg = fxCtx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.size*p.life*2.5);
      fg.addColorStop(0, `rgba(255,255,255,${p.life})`);
      fg.addColorStop(0.4, `rgba(255,140,0,${p.life*0.7})`);
      fg.addColorStop(1, 'transparent');
      fxCtx.beginPath();
      fxCtx.arc(p.x,p.y,p.size*p.life*2.5,0,Math.PI*2);
      fxCtx.fillStyle = fg;
      fxCtx.fill();
    }
  });

  requestAnimationFrame(loop);
}

// ── PROCESS HAND ──
function processHand(landmarks) {
  const f = fingersUp(landmarks);
  const gesture = getGestureName(f);
  const palmX = (1 - landmarks[9].x) * W;
  const palmY = landmarks[9].y * H;
  const indexX = (1 - landmarks[8].x) * W;
  const indexY = landmarks[8].y * H;

  document.getElementById('gestureBox').textContent = gesture;

  // ── DRAW: only index finger up ──
  if (isDrawMode(f)) {
    document.getElementById('modeBox').textContent = '✏ DRAW';
    document.getElementById('modeBox').style.color = '#00ffff';
    document.getElementById('modeBox').style.borderColor = '#00ffff';
    grabbedIdx = -1;
    if (!currentStroke) currentStroke = { points: [], color: '#00ffff', width: 3 };
    currentStroke.points.push({ x: indexX, y: indexY });
    if (currentStroke.points.length > 400) currentStroke.points.shift();
  } else {
    // Save stroke when leaving draw mode
    if (currentStroke && currentStroke.points.length > 4) {
      strokes.push({ ...currentStroke });
    }
    currentStroke = null;
  }

  // ── GRAB: fist ──
  if (isGrabMode(f)) {
    document.getElementById('modeBox').textContent = '✊ GRAB';
    document.getElementById('modeBox').style.color = '#ffaa00';
    document.getElementById('modeBox').style.borderColor = '#ffaa00';

    if (grabbedIdx === -1) {
      // Find nearest stroke to palm
      let minDist = 80, nearest = -1;
      strokes.forEach((stroke, si) => {
        const c = strokeCenter(stroke);
        const d = Math.hypot(c.x - palmX, c.y - palmY);
        if (d < minDist) { minDist = d; nearest = si; }
      });
      if (nearest !== -1) {
        grabbedIdx = nearest;
        const c = strokeCenter(strokes[nearest]);
        grabOffX = c.x - palmX;
        grabOffY = c.y - palmY;
      }
    }

    // Move grabbed stroke
    if (grabbedIdx !== -1) {
      const dx = palmX - prevPalmX;
      const dy = palmY - prevPalmY;
      strokes[grabbedIdx].points = strokes[grabbedIdx].points.map(pt => ({
        x: pt.x + dx, y: pt.y + dy
      }));
    }
  } else {
    if (!isDrawMode(f)) grabbedIdx = -1;
  }

  // ── BLAST: thumb only ──
  if (isBlast(f) && gesture !== lastGesture) {
    document.getElementById('modeBox').textContent = '⚡ BLAST!';
    document.getElementById('modeBox').style.color = '#ff6600';
    document.getElementById('modeBox').style.borderColor = '#ff6600';
    spawnBlast(palmX, palmY);
  }

  // ── OPEN: release ──
  if (isOpenHand(f)) {
    document.getElementById('modeBox').textContent = '🖐 OPEN';
    document.getElementById('modeBox').style.color = '#ff6600';
    document.getElementById('modeBox').style.borderColor = '#ff6600';
    grabbedIdx = -1;
  }

  prevPalmX = palmX;
  prevPalmY = palmY;
  lastGesture = gesture;
  renderDrawings();
}

// ── CAMERA ──
function startCamera() {
  document.getElementById('startBtn').style.display = 'none';
  document.getElementById('guide').style.display = 'none';
  loop();

  const video = document.getElementById('videoElement');
  const hands = new Hands({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
  hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.6 });

  hands.onResults(results => {
    bgCtx.save();
    bgCtx.scale(-1, 1);
    bgCtx.drawImage(results.image, -W, 0, W, H);
    bgCtx.restore();
    bgCtx.fillStyle = 'rgba(0,5,15,0.3)';
    bgCtx.fillRect(0, 0, W, H);

    if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
      lm = results.multiHandLandmarks[0];
      document.getElementById('statusText').textContent = 'ONLINE ●';
      processHand(lm);
    } else {
      lm = null;
      currentStroke = null;
      grabbedIdx = -1;
      document.getElementById('statusText').textContent = 'SCANNING...';
      document.getElementById('gestureBox').textContent = '– – –';
      document.getElementById('modeBox').textContent = 'STANDBY';
      renderDrawings();
    }
  });

  const camera = new Camera(video, {
    onFrame: async () => { await hands.send({ image: video }); },
    width: 1280, height: 720, facingMode: 'user'
  });
  camera.start().catch(() => {
    document.getElementById('startBtn').style.display = 'block';
    document.getElementById('startBtn').textContent = '⚠ RETRY';
  });
}
</script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
</body>
</html>
